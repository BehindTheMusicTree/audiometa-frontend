# Sync environment variables from GitHub to Vercel (Production and Preview).
# Run manually: Actions → Sync Vercel env → Run workflow.
# Uses GitHub Environments so BACKEND_BASE_URL / HTMT_API_ROOT_SEGMENT (and other per-env vars) can differ:
#   GitHub PROD → Vercel "production"; GitHub STAGING → Vercel "preview".
# Required: repo secrets VERCEL_TOKEN, VERCEL_PROJECT_ID; repo vars AUDIOMETA_DOCS_BUNDLE_URL;
#   in each GitHub Environment (PROD, STAGING): BACKEND_BASE_URL, HTMT_API_ROOT_SEGMENT,
#   AUDIOMETA_SITE_URL (public app URL, no trailing slash; maps to NEXT_PUBLIC_SITE_URL),
#   secret VERCEL_DEPLOY_HOOK (per env, different URL for prod vs staging). See docs/DEPLOYMENT.md §3.1.
name: Sync Vercel env

on:
  workflow_dispatch:

jobs:
  sync-production:
    name: Sync to Vercel production
    runs-on: ubuntu-latest
    environment: PROD
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
      NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      AUDIOMETA_DOCS_BUNDLE_URL: ${{ vars.AUDIOMETA_DOCS_BUNDLE_URL }}
      AUDIOMETA_SITE_URL: ${{ vars.AUDIOMETA_SITE_URL }}
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
      HTMT_API_ROOT_SEGMENT: ${{ vars.HTMT_API_ROOT_SEGMENT }}
    steps:
      - name: Validate required env vars
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          [ -z "$VERCEL_DEPLOY_HOOK" ] && missing="$missing VERCEL_DEPLOY_HOOK"
          [ -z "$AUDIOMETA_DOCS_BUNDLE_URL" ] && missing="$missing AUDIOMETA_DOCS_BUNDLE_URL"
          [ -z "$AUDIOMETA_SITE_URL" ] && missing="$missing AUDIOMETA_SITE_URL"
          [ -z "$BACKEND_BASE_URL" ] && missing="$missing BACKEND_BASE_URL"
          [ -z "$HTMT_API_ROOT_SEGMENT" ] && missing="$missing HTMT_API_ROOT_SEGMENT"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty (repo vars or PROD env):$missing"
            exit 1
          fi
          echo "All required env vars are set."

      - name: Sync to Vercel production
        run: |
          set -e
          sync_var() {
            local value="$1"
            local key="$2"
            [ -z "$value" ] && return 0
            echo "Syncing $key to production..."
            body=$(jq -n --arg key "$key" --arg value "$value" '{key:$key, value:$value, type:"plain", target:["production"]}')
            curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body"
          }
          sync_secret_var() {
            local value="$1"
            local key="$2"
            [ -z "$value" ] && return 0
            echo "Syncing $key (secret) to production..."
            body=$(jq -n --arg key "$key" --arg value "$value" '{key:$key, value:$value, type:"sensitive", target:["production"]}')
            curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body"
          }
          sync_var "$AUDIOMETA_DOCS_BUNDLE_URL" "NEXT_PUBLIC_DOCS_BUNDLE_URL"
          sync_var "$AUDIOMETA_SITE_URL" "NEXT_PUBLIC_SITE_URL"
          sync_var "$BACKEND_BASE_URL" "NEXT_PUBLIC_BACKEND_BASE_URL"
          sync_var "$HTMT_API_ROOT_SEGMENT" "NEXT_PUBLIC_HTMT_API_ROOT_SEGMENT"
          sync_secret_var "$NPM_TOKEN" "NPM_TOKEN"
          echo "Production sync done."

      - name: Trigger Vercel production deploy
        run: curl -f -sS -X POST "$VERCEL_DEPLOY_HOOK"

  sync-staging:
    name: Sync to Vercel preview (staging)
    runs-on: ubuntu-latest
    environment: STAGING
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
      NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      AUDIOMETA_DOCS_BUNDLE_URL: ${{ vars.AUDIOMETA_DOCS_BUNDLE_URL }}
      AUDIOMETA_SITE_URL: ${{ vars.AUDIOMETA_SITE_URL }}
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
      HTMT_API_ROOT_SEGMENT: ${{ vars.HTMT_API_ROOT_SEGMENT }}
    steps:
      - name: Validate required env vars
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          [ -z "$VERCEL_DEPLOY_HOOK" ] && missing="$missing VERCEL_DEPLOY_HOOK"
          [ -z "$AUDIOMETA_DOCS_BUNDLE_URL" ] && missing="$missing AUDIOMETA_DOCS_BUNDLE_URL"
          [ -z "$AUDIOMETA_SITE_URL" ] && missing="$missing AUDIOMETA_SITE_URL"
          [ -z "$BACKEND_BASE_URL" ] && missing="$missing BACKEND_BASE_URL"
          [ -z "$HTMT_API_ROOT_SEGMENT" ] && missing="$missing HTMT_API_ROOT_SEGMENT"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty (repo vars or STAGING env):$missing"
            exit 1
          fi
          echo "All required env vars are set."

      - name: Sync to Vercel preview
        run: |
          set -e
          sync_var() {
            local value="$1"
            local key="$2"
            [ -z "$value" ] && return 0
            echo "Syncing $key to preview..."
            body=$(jq -n --arg key "$key" --arg value "$value" '{key:$key, value:$value, type:"plain", target:["preview"]}')
            curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body"
          }
          sync_secret_var() {
            local value="$1"
            local key="$2"
            [ -z "$value" ] && return 0
            echo "Syncing $key (secret) to preview..."
            body=$(jq -n --arg key "$key" --arg value "$value" '{key:$key, value:$value, type:"sensitive", target:["preview"]}')
            curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body"
          }
          sync_var "$AUDIOMETA_DOCS_BUNDLE_URL" "NEXT_PUBLIC_DOCS_BUNDLE_URL"
          sync_var "$AUDIOMETA_SITE_URL" "NEXT_PUBLIC_SITE_URL"
          sync_var "$BACKEND_BASE_URL" "NEXT_PUBLIC_BACKEND_BASE_URL"
          sync_var "$HTMT_API_ROOT_SEGMENT" "NEXT_PUBLIC_HTMT_API_ROOT_SEGMENT"
          sync_secret_var "$NPM_TOKEN" "NPM_TOKEN"
          echo "Preview sync done."

      - name: Trigger Vercel preview (staging) deploy
        run: curl -f -sS -X POST "$VERCEL_DEPLOY_HOOK"
