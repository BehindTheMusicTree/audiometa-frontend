# Lint, test, and build on develop (staging) and main (production).
# Vercel deploys: develop → staging, main → production (see docs/DEPLOYMENT.md).
name: Validate

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set build env (staging vs production)
        run: |
          BRANCH="${{ github.base_ref || github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "NEXT_PUBLIC_APP_URL=https://app.audiometa.com" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_APP_URL=https://staging.audiometa.com" >> "$GITHUB_ENV"
          fi

      - name: Build application
        run: npm run build
