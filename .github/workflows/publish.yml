# Runs on version tag push (e.g. v0.1.0). Validates release tag is on main, then runs build.
# Add Docker build/push and deploy steps when your infrastructure is ready.
name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  validate-tag-on-main:
    name: Ensure release tag is on main
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release tag points to a commit on main
        run: |
          TAG_REF="${{ github.ref }}"
          TAG_NAME="${TAG_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "Pre-release or dev tag ($TAG_NAME); skipping main check"
            exit 0
          fi
          TAG_COMMIT=$(git rev-parse "$TAG_REF")
          git fetch origin main
          if ! git branch -r --contains "$TAG_COMMIT" | grep -q 'origin/main'; then
            echo "::error::Tag $TAG_NAME points to a commit not on main. Release tags (vX.Y.Z) must be created from main. See docs/VERSIONING.md"
            exit 1
          fi
          echo "Release tag $TAG_NAME is on main"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [validate-tag-on-main]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          NEXT_PUBLIC_APP_URL: https://example.com
        run: npm run build

      - name: Output version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "Built version: $VERSION"
